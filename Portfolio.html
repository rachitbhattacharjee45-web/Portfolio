<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 50px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background: #1e293b;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I'm a web developer passionate about building websites.</p>
</section>

<section id="projects">
    <h2>My Projects</h2>

    <div class="card">
        <h3>Project 1</h3>
        <p>Simple website</p>
    </div>

    <div class="card">
        <h3>Project 2</h3>
        <p>JavaScript App</p>
    </div>

</section>

<section id="contact">
    <h2>Contact Me</h2>
    <button onclick="showMessage()">Click Me</button>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

<script>
function showMessage() {
    alert("Thanks for visiting my portfolio!");
}
</script>

</body>
</html>
